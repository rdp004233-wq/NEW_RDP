name: RDP 2026

on:
  workflow_dispatch:
    inputs:
      ts_authkey:
        description: "Tailscale Auth key"
        required: true
      cycles:
        description: "Number of cycles"
        required: false
        default: "1"

permissions:
  contents: read
  actions: write

jobs:
  full:
    runs-on: windows-latest
    timeout-minutes: 360

    env:
      RDP_USER: mtqmanik
      RDP_PASS: Manik2200@@
      MAIN_RUNTIME_MIN: 360

    steps:

    # ---------------- SYSTEM OPTIMIZATION ----------------
    - name: System Optimization for Speed
      shell: pwsh
      run: |
        # Disable Windows Defender real-time scanning for faster installs
        Set-MpPreference -DisableRealtimeMonitoring $true
        
        # Optimize network settings
        netsh int tcp set global autotuninglevel=normal
        netsh int tcp set global rss=enabled
        
        # Clear DNS cache
        ipconfig /flushdns
        
        # Set PowerShell to use TLS 1.2
        [Net.ServicePointManager]::SecurityProtocol = [Net.SecurityProtocolType]::Tls12
        
        # Enable faster downloads
        $env:DOTNET_CLI_TELEMETRY_OPTOUT = 1

    # ---------------- BASIC ----------------
    - name: Show runner info
      shell: pwsh
      run: |
        whoami
        systeminfo | findstr /B /C:"OS Name"

    # ---------------- TAILSCALE (OPTIMIZED) ----------------
    - name: Install and Start Tailscale (Optimized)
      shell: pwsh
      run: |
        $exe = "$env:ProgramFiles\Tailscale\tailscale.exe"

        if (-not (Test-Path $exe)) {
          Write-Host "Downloading Tailscale with optimized settings..."
          
          # Use faster download with progress
          $ProgressPreference = 'SilentlyContinue'
          
          # Multiple download sources for failover
          $urls = @(
            "https://pkgs.tailscale.com/stable/tailscale-setup-1.82.0-amd64.msi",
            "https://dl.tailscale.com/stable/tailscale-setup-1.82.0-amd64.msi"
          )
          
          foreach ($url in $urls) {
            try {
              Invoke-WebRequest -Uri $url -OutFile tailscale.msi -UseBasicParsing -TimeoutSec 30
              if (Test-Path tailscale.msi) { break }
            } catch {
              Write-Host "Failed to download from $url, trying next..."
            }
          }
          
          Write-Host "Installing Tailscale..."
          Start-Process msiexec.exe -ArgumentList "/i tailscale.msi /quiet /norestart" -Wait -NoNewWindow
        }

        # Start service with higher priority
        Set-Service -Name Tailscale -StartupType Automatic
        Start-Service Tailscale
        
        # Wait for service to be ready
        $ready = $false
        for ($i=0; $i -lt 5; $i++) {
          if ((Get-Service Tailscale).Status -eq 'Running') {
            $ready = $true
            break
          }
          Start-Sleep 2
        }

        # Connect with optimized settings
        & $exe up --authkey "${{ inputs.ts_authkey }}" --hostname "bullet" --accept-dns=false --accept-routes

        # Faster IP detection
        $ip = $null
        for ($i=0; $i -lt 15; $i++) {
          try {
            $ip = & $exe ip -4 2>$null | Where-Object { $_ -match '\d+\.\d+\.\d+\.\d+' } | Select-Object -First 1
            if ($ip) { break }
          } catch {}
          Start-Sleep 2
        }

        if (-not $ip) { 
          Write-Host "Trying alternative IP detection..."
          $ip = (Get-NetIPAddress -AddressFamily IPv4 | Where-Object { $_.InterfaceAlias -like "*Tailscale*" }).IPAddress
        }
        
        if (-not $ip) { throw "Tailscale IP not found" }

        echo "TS_IP=$ip" >> $env:GITHUB_ENV
        Write-Host "Tailscale IP: $ip - Connected successfully!"

    # ---------------- RDP (OPTIMIZED) ----------------
    - name: Enable RDP (Optimized)
      shell: pwsh
      run: |
        $sec = ConvertTo-SecureString $env:RDP_PASS -AsPlainText -Force

        if (-not (Get-LocalUser $env:RDP_USER -EA SilentlyContinue)) {
          New-LocalUser $env:RDP_USER -Password $sec -PasswordNeverExpires
          Add-LocalGroupMember Administrators $env:RDP_USER
          Add-LocalGroupMember "Remote Desktop Users" $env:RDP_USER
        }

        # RDP Optimizations
        Set-ItemProperty "HKLM:\System\CurrentControlSet\Control\Terminal Server" -Name fDenyTSConnections -Value 0
        Set-ItemProperty "HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp" -Name UserAuthentication -Value 0
        
        # Network Level Authentication disable for easier connection
        Set-ItemProperty "HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp" -Name SecurityLayer -Value 0
        
        # Enable RDP port
        Set-ItemProperty "HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp" -Name PortNumber -Value 3389
        
        # Firewall rules
        Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
        New-NetFirewallRule -DisplayName "RDP Port 3389" -Direction Inbound -Protocol TCP -LocalPort 3389 -Action Allow

    # ---------------- PYTHON (OPTIMIZED) ----------------
    - name: Install Python (Cached & Fast)
      shell: pwsh
      run: |
        # Use pip cache and fast downloads
        $ProgressPreference = 'SilentlyContinue'
        
        Write-Host "Upgrading pip with fast mirror..."
        python -m pip install --upgrade pip --no-cache-dir -i https://pypi.org/simple
        
        Write-Host "Installing packages in parallel..."
        
        # Install packages in groups for speed
        $packages1 = @("gdown", "customtkinter")
        $packages2 = @("uiautomator2", "opencv-python")
        $packages3 = @("playwright")
        
        # Parallel install (batch 1)
        foreach ($pkg in $packages1) {
          Start-Job -ScriptBlock {
            param($package)
            pip install $package --no-cache-dir
          } -ArgumentList $pkg
        }
        
        Get-Job | Wait-Job | Receive-Job
        Remove-Job *
        
        # Parallel install (batch 2)
        foreach ($pkg in $packages2) {
          Start-Job -ScriptBlock {
            param($package)
            pip install $package --no-cache-dir
          } -ArgumentList $pkg
        }
        
        Get-Job | Wait-Job | Receive-Job
        Remove-Job *
        
        # Install playwright with browsers (sequential - needs order)
        pip install playwright --no-cache-dir
        playwright install chromium --with-deps
        
        Write-Host "All packages installed successfully!"

    # ---------------- PERFORMANCE TWEAKS ----------------
    - name: Performance Optimization
      shell: pwsh
      run: |
        # Disable visual effects for better RDP performance
        Set-ItemProperty "HKCU:\Software\Microsoft\Windows\CurrentVersion\Explorer\VisualEffects" -Name VisualFXSetting -Value 2
        
        # Power plan to High Performance
        powercfg /setactive 8c5e7fda-e8bf-4a96-9a85-a6e23a8c635c
        
        # Disable screen saver and sleep
        powercfg -change -standby-timeout-ac 0
        powercfg -change -monitor-timeout-ac 0
        
        # Optimize for background services
        Set-ItemProperty "HKLM:\System\CurrentControlSet\Control\PriorityControl" -Name Win32PrioritySeparation -Value 38

    # ---------------- KEEP ALIVE (OPTIMIZED) ----------------
    - name: Keep Alive (Optimized)
      shell: pwsh
      run: |
        Write-Host "System is ready! Keep alive started..."
        Write-Host "========================================"
        Write-Host "CONNECTION INFO:"
        Write-Host "RDP IP: $env:TS_IP"
        Write-Host "Username: $env:RDP_USER"
        Write-Host "Password: $env:RDP_PASS"
        Write-Host "========================================"
        
        # Anti-idle script to prevent disconnection
        $wsh = New-Object -ComObject WScript.Shell
        $endTime = (Get-Date).AddMinutes($env:MAIN_RUNTIME_MIN)
        
        while ((Get-Date) -lt $endTime) {
          # Simulate user activity
          $wsh.SendKeys("{SCROLLLOCK}{SCROLLLOCK}")
          Write-Host "$(Get-Date) - Keeping session alive..."
          Start-Sleep -Seconds 300
        }

    - name: Done
      shell: pwsh
      run: |
        Write-Host "========================================"
        Write-Host "SESSION COMPLETED SUCCESSFULLY!"
        Write-Host "RDP IP: $env:TS_IP"
        Write-Host "========================================"
